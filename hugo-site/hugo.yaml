baseURL: "https://brandonstewart.org/"
title: "Brandon M. Stewart"
locale: en-us
timeZone: America/New_York

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind

outputs:
  home: [HTML, RSS]

params:
  description: "Brandon M. Stewart is Professor of Sociology at Princeton University."
  profile:
    name: "Brandon M. Stewart"
    title: "Professor of Sociology"
    institution: "Princeton University"
    photo: "images/brandon-stewart-home.jpg"
    bio_photo: "images/brandon-stewart-wide.jpg"
    cv_pdf: "files/StewartCVweb.pdf"
    intro: "Brandon M. Stewart is Professor of Sociology at [Princeton University](https://www.princeton.edu/). He is Co-Editor-in-Chief of [*Political Analysis*](https://www.cambridge.org/core/journals/political-analysis) and Associate Editor at [*Sociological Methods & Research*](https://journals.sagepub.com/home/smr). He develops new methods for applications across computational social science."
    email: "bms4@princeton.edu"
    google_scholar: "https://scholar.google.com/citations?user=miPgny8AAAAJ&hl=en"
  appearance:
    theme_day: custom
    theme_night: custom
    color_mode: light
    font: native
    font_size: L
  header:
    navbar:
      enable: true
      show_search: true
  extensions:
    css:
      - css/custom.css

markup:
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  tag: tags

permalinks:
  publication: /publication/:slug/
  software: /software/:slug/

menu:
  main:
    - name: Bio
      url: /bio/
      weight: 10
    - name: Publications
      url: /publication/
      weight: 20
    - name: Software
      url: /software/
      weight: 40
