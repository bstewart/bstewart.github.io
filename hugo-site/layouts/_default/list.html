{{ define "main" }}
<div class="container page-shell">
  <div class="page-title-block">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
  </div>
  <div class="compact-list">
    {{ range .Pages }}
      <div class="person-row"><a href="{{ .RelPermalink }}">{{ .Title }}</a>{{ with .Params.role }} <span class="pub-meta">{{ . }}</span>{{ end }}</div>
    {{ end }}
  </div>
</div>
{{ end }}
